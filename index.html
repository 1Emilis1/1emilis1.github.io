<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="google-site-verification" content="D-QRva2UUoXNtY0a9z_svBo3CG_BpE1d66fQ77mNzK4">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1Emilis | Home</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --card: #1a1a1a;
            --accent: #007aff;
            --text: #ffffff;
            --text-dim: #a1a1a1;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        p {
            color: var(--text-dim);
            margin-bottom: 2rem;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            max-width: 400px;
            width: 90%;
        }

        .card {
            background: var(--card);
            padding: 2rem;
            border-radius: 18px;
            text-decoration: none;
            color: inherit;
            border: 1px solid #333;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        .card h2 {
            margin: 0 0 0.5rem 0;
            color: var(--accent);
        }

        .card p {
            margin: 0;
            font-size: 0.9rem;
        }

        .footer {
            position: absolute;
            bottom: 2rem;
            font-size: 0.8rem;
            color: #444;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>1Emilis</h1>
        <p>Developer & Tech Enthusiast</p>

        <div class="projects-grid">
            <a href="/ipa/index.html" class="card">
                <h2>iPATool-EZ</h2>
                <p>Advanced IPA management and downgrade utility.</p>
            </a>
            
            </div>
    </div>

    <div class="footer">
        © 2026 1Emilis
    </div>

</body>
</html>
